<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>통계</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="tabs">

<button class="tab active" onclick="showTab('level')">레벨</button>
<button class="tab" onclick="showTab('grade')">등급</button>
<button class="tab" onclick="showTab('class')">직업</button>

</div>


<div id="level" class="tab-content active">

<h2>레벨 통계</h2>
<canvas id="levelChart"></canvas>
<div id="levelTable"></div>

</div>


<div id="grade" class="tab-content">

<h2>등급 통계</h2>
<canvas id="gradeChart"></canvas>
<div id="gradeTable"></div>

</div>


<div id="class" class="tab-content">

<h2>직업 통계</h2>
<canvas id="classChart"></canvas>
<div id="classTable"></div>

</div>


<script src="stats.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<title>결사 통계</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<div class="container">

<h1>결사 통계 대시보드</h1>


<section>

<h2>레벨별 통계</h2>

<div class="statBox">

<canvas id="levelChart"></canvas>

<table id="levelTable">

<thead>

<tr>
<th>구분</th>
<th>수치</th>
<th>%</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</section>



<section>

<h2>등급별 통계</h2>

<div class="statBox">

<canvas id="gradeChart"></canvas>

<table id="gradeTable">

<thead>

<tr>
<th>구분</th>
<th>수치</th>
<th>%</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</section>



<section>

<h2>직업별 통계</h2>

<div class="statBox">

<canvas id="classChart"></canvas>

<table id="classTable">

<thead>

<tr>
<th>구분</th>
<th>수치</th>
<th>%</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</section>


</div>

<script src="stats.js"></script>

</body>
</html>
